<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Airstrike – Real Flight Controls</title>
<style>
body { margin:0; overflow:hidden; background:black; }
#hud {
  position:absolute;
  width:100%;
  height:100%;
  pointer-events:none;
  color:#00ffcc;
  font-family:Arial;
}
#crosshair {
  position:absolute;
  top:50%; left:50%;
  transform:translate(-50%,-50%);
}
#status {
  position:absolute;
  top:10px; left:10px;
  color:white;
}
</style>
</head>
<body>

<div id="hud">
  <div id="crosshair">+</div>
  <div id="status">Flight Mode</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>
// ===== SCENE =====
let scene = new THREE.Scene();
let camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 3000);

let renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// LIGHT
scene.add(new THREE.AmbientLight(0xffffff,0.6));
let sun = new THREE.DirectionalLight(0xffffff,1);
sun.position.set(200,200,100);
scene.add(sun);

// GROUND
let ground = new THREE.Mesh(
  new THREE.PlaneGeometry(1000,1000),
  new THREE.MeshStandardMaterial({color:0x444444})
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

// BUILDINGS
let buildings = [];
for(let i=0;i<40;i++){
  let b = new THREE.Mesh(
    new THREE.BoxGeometry(10,20+Math.random()*40,10),
    new THREE.MeshStandardMaterial({color:0x888888})
  );
  b.position.set((Math.random()-0.5)*400, b.geometry.parameters.height/2, (Math.random()-0.5)*400);
  buildings.push(b);
  scene.add(b);
}

// ===== JET =====
let jet = new THREE.Object3D();
scene.add(jet);

let body = new THREE.Mesh(
  new THREE.ConeGeometry(1,6,12),
  new THREE.MeshStandardMaterial({color:0xffffff})
);
body.rotation.z = Math.PI/2;
jet.add(body);

jet.position.set(0,80,0);

// CAMERA FOLLOW
camera.position.set(0,5,15);
jet.add(camera);

// ===== CONTROLS =====
let keys = {};
document.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
document.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

document.body.onclick = ()=>document.body.requestPointerLock();

// ===== FLIGHT PHYSICS =====
let velocity = new THREE.Vector3();

let yaw = 0;
let pitch = 0;
let roll = 0;

// mouse = pitch
document.addEventListener("mousemove", e=>{
  if(document.pointerLockElement){
    pitch -= e.movementY * 0.002;
    pitch = Math.max(-1, Math.min(1, pitch));
  }
});

// ===== MISSILES =====
let missiles = [];

// ===== LOOP =====
function animate(){
requestAnimationFrame(animate);

// ===== ROLL (A/D) =====
if(keys["a"]) roll += 0.03;
if(keys["d"]) roll -= 0.03;

// auto-level
roll *= 0.9;

// ===== TURNING (THIS IS THE FIX) =====
yaw += roll * 0.05;

// apply rotation
jet.rotation.order = "YXZ";
jet.rotation.y = yaw;
jet.rotation.x = pitch;
jet.rotation.z = roll;

// ===== FORWARD FLIGHT =====
let forward = new THREE.Vector3(0,0,-1).applyQuaternion(jet.quaternion);

// always moving forward (jet feel)
velocity.add(forward.multiplyScalar(0.8));

// extra boost
if(keys["w"]) velocity.add(forward.multiplyScalar(0.5));

// vertical control
if(keys[" "]) velocity.y += 0.4;
if(keys["shift"]) velocity.y -= 0.4;

velocity.multiplyScalar(0.95);
jet.position.add(velocity);

// keep above ground
if(jet.position.y < 10) jet.position.y = 10;

// ===== MISSILE FIRE =====
if(keys["f"]){
  keys["f"] = false;

  let missile = new THREE.Mesh(
    new THREE.CylinderGeometry(0.3,0.5,4),
    new THREE.MeshBasicMaterial({color:0xff0000})
  );

  missile.rotation.z = Math.PI/2;
  missile.position.copy(jet.position);
  scene.add(missile);

  missiles.push({
    mesh:missile,
    vel:forward.clone().multiplyScalar(2)
  });
}

// ===== MISSILES =====
missiles.forEach((m,i)=>{
  m.mesh.position.add(m.vel);

  if(m.mesh.position.y < 0){
    scene.remove(m.mesh);
    missiles.splice(i,1);
  }
});

renderer.render(scene,camera);
}

animate();

// RESIZE
window.addEventListener("resize",()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
</script>

</body>
</html>
